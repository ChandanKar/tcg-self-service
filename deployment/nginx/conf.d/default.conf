upstream vmcontrol_app {
    server app:8080;
}

# Redirect all HTTP to HTTPS
server {
    listen 80;
    server_name _;

    # Health check stays on HTTP so load-balancer/monitoring can reach it without TLS
    location /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — SSL termination + proxy to Spring Boot
server {
    listen 443 ssl;
    server_name selfservice-new.tcgdigital.com;

    ssl_certificate     /etc/nginx/conf.d/certs/STAR_tcgdigital_com.crt;
    ssl_certificate_key /etc/nginx/conf.d/certs/STAR_tcgdigital_com.key;

    # Modern TLS only
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       10m;

    client_max_body_size 20m;

    # Health check
    location /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Proxy everything to Spring Boot
    location / {
        proxy_pass http://vmcontrol_app;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_read_timeout  90s;
        proxy_send_timeout  90s;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

# Required for WebSocket header map
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
