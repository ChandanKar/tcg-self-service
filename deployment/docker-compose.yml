services:

  # ---------------------------------------------------------------------------
  # MySQL 8 — production database (data in named volume, survives restarts)
  # ---------------------------------------------------------------------------
  db:
    image: mysql:8.0
    container_name: vmcontrol-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-vmcontrol}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./mysql/data:/var/lib/mysql
    networks:
      - vmcontrol-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Application — Spring Boot fat JAR
  #
  # Deploy workflow:
  #   1. Build:   ./gradlew bootJar  (from project root)
  #   2. Copy:    cp build/libs/vmcontrol-*.jar deployment/app/vmcontrol.jar
  #   3. Restart: docker compose restart app
  # ---------------------------------------------------------------------------
  app:
    image: amazoncorretto:17-alpine
    container_name: vmcontrol-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_AZURE_REDIRECT_URI: https://selfservice-new.tcgdigital.com/login/oauth2/code/azure
    volumes:
      - ./app:/app
      - ./logs:/app/logs
      - ./config/application-prod.properties:/app/config/application-prod.properties:ro
    working_dir: /app
    command: [
      "java",
      "-Dspring.security.oauth2.client.registration.azure.redirect-uri=https://selfservice-new.tcgdigital.com/login/oauth2/code/azure",
      "-jar", "vmcontrol.jar"
    ]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - vmcontrol-net

  # ---------------------------------------------------------------------------
  # Nginx — reverse proxy; terminates HTTP, forwards to app on port 8080
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: vmcontrol-nginx
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    networks:
      - vmcontrol-net

networks:
  vmcontrol-net:
    driver: bridge
