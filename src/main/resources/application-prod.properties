# =============================================================================
# Production Profile Configuration
# Activate with: SPRING_PROFILES_ACTIVE=prod or -Dspring.profiles.active=prod
# =============================================================================

# Disable H2 console in production (security requirement)
spring.h2.console.enabled=false

# Disable SQL logging in production
spring.jpa.show-sql=false

# Stricter JPA settings for production
spring.jpa.hibernate.ddl-auto=validate

# Flyway - don't clean on validation errors in production
spring.flyway.clean-on-validation-error=false
spring.flyway.clean-disabled=true

# Logging - write to file for persistence and host-side access
logging.file.name=/app/logs/vmcontrol.log
logging.logback.rollingpolicy.max-file-size=50MB
logging.logback.rollingpolicy.max-history=30
logging.logback.rollingpolicy.total-size-cap=500MB

# Hardcode HTTPS redirect URI — avoids X-Forwarded-Proto issues behind Nginx
spring.security.oauth2.client.registration.azure.redirect-uri=https://selfservice-new.tcgdigital.com/login/oauth2/code/azure

# Disable detailed error messages in production
server.error.include-stacktrace=never
server.error.include-message=never

# Enable HTTPS in production (configure your keystore)
# server.ssl.enabled=true
# server.ssl.key-store=classpath:keystore.p12
# server.ssl.key-store-password=${SSL_KEYSTORE_PASSWORD}
# server.ssl.key-store-type=PKCS12

# Entra ID should always be enabled in production
entraid.enabled=true

# =============================================================================
# HikariCP Connection Pool — Production Tuning
# =============================================================================
spring.datasource.hikari.pool-name=vmcontrol-pool

# 10 connections fits a 2–4 core host; async executor peaks at 20 threads but
# most tasks are AWS-SDK-bound rather than DB-bound simultaneously.
# Raise to 20 only if profiling shows pool contention under peak load.
spring.datasource.hikari.maximum-pool-size=10

# Keep 5 warm idle connections so the first burst after a quiet period
# does not pay connection-setup latency.
spring.datasource.hikari.minimum-idle=5

# Fail fast: throw if no connection available within 20 s (default is 30 s).
spring.datasource.hikari.connection-timeout=20000

# Retire idle connections that have been unused for 10 min.
spring.datasource.hikari.idle-timeout=600000

# Recycle every connection after 30 min regardless of idle state.
# Must be less than MySQL's wait_timeout (default 28 800 s = 8 h).
spring.datasource.hikari.max-lifetime=1800000

# Send a keepalive ping every 60 s to prevent NAT/firewall from silently
# killing idle connections between the pool and MySQL.
spring.datasource.hikari.keepalive-time=60000

# Emit a WARN log if any borrow is held for more than 60 s — indicates
# either a slow query or a connection leak in service code.
spring.datasource.hikari.leak-detection-threshold=60000

# Disable Swagger UI and OpenAPI docs in production (security)
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

