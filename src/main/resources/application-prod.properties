# =============================================================================
# Production Profile Configuration
# Activate with: SPRING_PROFILES_ACTIVE=prod or -Dspring.profiles.active=prod
# =============================================================================

# Disable H2 console in production (security requirement)
spring.h2.console.enabled=false

# Disable SQL logging in production
spring.jpa.show-sql=false

# Stricter JPA settings for production
spring.jpa.hibernate.ddl-auto=validate

# Flyway - don't clean on validation errors in production
spring.flyway.clean-on-validation-error=false
spring.flyway.clean-disabled=true

# Logging - write to file for persistence and host-side access
logging.file.name=/app/logs/vmcontrol.log
logging.logback.rollingpolicy.max-file-size=50MB
logging.logback.rollingpolicy.max-history=30
logging.logback.rollingpolicy.total-size-cap=500MB

# Hardcode HTTPS redirect URI — avoids X-Forwarded-Proto issues behind Nginx
spring.security.oauth2.client.registration.azure.redirect-uri=https://selfservice-new.tcgdigital.com/login/oauth2/code/azure

# Disable detailed error messages in production
server.error.include-stacktrace=never
server.error.include-message=never

# Enable HTTPS in production (configure your keystore)
# server.ssl.enabled=true
# server.ssl.key-store=classpath:keystore.p12
# server.ssl.key-store-password=${SSL_KEYSTORE_PASSWORD}
# server.ssl.key-store-type=PKCS12

# Entra ID should always be enabled in production
entraid.enabled=true

# Disable Swagger UI and OpenAPI docs in production (security)
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

