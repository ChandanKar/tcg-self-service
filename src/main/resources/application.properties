spring.application.name=vmcontrol

#spring.data.redis.host=localhost
#spring.data.redis.port=6379
#app.redis.embedded.enabled=false

# =============================================================================
# H2 database configuration for development
# Values loaded from .env file (with sensible defaults)
# =============================================================================
spring.datasource.url=${DB_URL:jdbc:h2:file:./data/vmcontrol;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL;NON_KEYWORDS=VALUE}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.database-platform=${DB_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
spring.h2.console.path=${H2_CONSOLE_PATH:/h2-console}

# Flyway configuration
spring.flyway.clean-on-validation-error=${FLYWAY_CLEAN_ON_VALIDATION_ERROR:false}
spring.flyway.baseline-on-migrate=${FLYWAY_BASELINE_ON_MIGRATE:true}
spring.flyway.out-of-order=${FLYWAY_OUT_OF_ORDER:false}

# =============================================================================
# Entra ID (Azure AD) OAuth2 Authentication
# =============================================================================
# Set entraid.enabled=true to enable authentication via Microsoft Entra ID.
# When disabled (false), all requests are permitted.
entraid.enabled=${ENTRAID_ENABLED:true}

# Azure OAuth2 Configuration (values from .env - no defaults for secrets)
spring.security.oauth2.client.registration.azure.provider=azure
spring.security.oauth2.client.registration.azure.client-id=${AZURE_CLIENT_ID}
spring.security.oauth2.client.registration.azure.client-secret=${AZURE_CLIENT_SECRET}
spring.security.oauth2.client.registration.azure.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.azure.scope[0]=openid
spring.security.oauth2.client.registration.azure.scope[1]=profile
spring.security.oauth2.client.registration.azure.scope[2]=email
spring.security.oauth2.client.registration.azure.scope[3]=offline_access
spring.security.oauth2.client.registration.azure.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.provider.azure.authorization-uri=https://login.microsoftonline.com/${AZURE_TENANT_ID}/oauth2/v2.0/authorize
spring.security.oauth2.client.provider.azure.token-uri=https://login.microsoftonline.com/${AZURE_TENANT_ID}/oauth2/v2.0/token
spring.security.oauth2.client.provider.azure.jwk-set-uri=https://login.microsoftonline.com/${AZURE_TENANT_ID}/discovery/v2.0/keys
spring.security.oauth2.client.provider.azure.user-info-uri=https://graph.microsoft.com/oidc/userinfo
spring.security.oauth2.client.provider.azure.user-name-attribute=name

# =============================================================================
# AWS Configuration (values from .env - no defaults for secrets)
# =============================================================================
aws.access-key=${AWS_ACCESS_KEY}
aws.secret-key=${AWS_SECRET_KEY}
aws.region=${AWS_REGION:ap-south-1}

# =============================================================================
# VM State Sync Configuration
# =============================================================================
# Enable/disable automatic VM state synchronization
vm.state.sync.enabled=${VM_STATE_SYNC_ENABLED:true}
# Sync interval in milliseconds (default: 5 minutes = 300000)
vm.state.sync.interval=${VM_STATE_SYNC_INTERVAL:300000}
# Initial delay before first sync in milliseconds (default: 1 minute = 60000)
vm.state.sync.initial-delay=${VM_STATE_SYNC_INITIAL_DELAY:60000}

# =============================================================================
# EKS Sync Configuration
# =============================================================================
# Enable EKS node group sync (opt-in; requires EKS environments to exist in DB)
eks.sync.enabled=${EKS_SYNC_ENABLED:true}
# Sync interval in milliseconds (default: 5 minutes)
eks.sync.interval=${EKS_SYNC_INTERVAL:300000}
# Initial delay before first EKS sync in milliseconds (default: 1 minute)
eks.sync.initial-delay=${EKS_SYNC_INITIAL_DELAY:60000}
# Minimum node count to restore when starting a stopped node group (fallback when no saved metadata)
eks.nodegroup.default-min-size=${EKS_DEFAULT_MIN_SIZE:1}
# Poll interval during scale-up/down wait loop in milliseconds
eks.nodegroup.poll-interval-ms=${EKS_POLL_INTERVAL_MS:15000}
# Max time to wait for a scale operation to complete in milliseconds (default: 15 minutes)
eks.nodegroup.operation-timeout-ms=${EKS_OP_TIMEOUT_MS:900000}

# =============================================================================
# VM Auto-Discovery Configuration
# =============================================================================
# Enable tag-based EC2 discovery (opt-in; requires tcg:environment tag on instances)
vm.discovery.enabled=${VM_DISCOVERY_ENABLED:false}
# Discovery interval in milliseconds (default: 10 minutes)
vm.discovery.interval=${VM_DISCOVERY_INTERVAL:600000}
# Initial delay before first discovery run (default: 2 minutes)
vm.discovery.initial-delay=${VM_DISCOVERY_INITIAL_DELAY:120000}
# Discovery strategy: "tag" (match by tag key=env-name) or "name-pattern" (parse Name tag like tcg-backend-1)
vm.discovery.strategy=${VM_DISCOVERY_STRATEGY:tag}
# AWS tag key used to match instances to environments (strategy=tag only)
vm.discovery.tag.environment-key=${VM_DISCOVERY_TAG_ENV_KEY:tcg:environment}
# Name prefix filter for name-pattern strategy — only instances whose Name starts with this are considered
vm.discovery.name-pattern.prefix=${VM_DISCOVERY_NAME_PREFIX:}

# =============================================================================
# Actuator — expose only /actuator/health; lock down everything else
# =============================================================================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

# =============================================================================
# User Management Configuration
# =============================================================================
# Email of user to auto-promote to admin on first OAuth2 login
# This is useful for bootstrapping the first admin user
app.initial-admin-email=${APP_INITIAL_ADMIN_EMAIL:}

