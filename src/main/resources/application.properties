spring.application.name=vmcontrol

#spring.data.redis.host=localhost
#spring.data.redis.port=6379
#app.redis.embedded.enabled=false

# =============================================================================
# H2 database configuration for development. For production, switch to a more robust database like MySQL or PostgreSQL and update the properties accordingly.
# =============================================================================
spring.datasource.url=jdbc:h2:file:D:/workspace/mcube/code/core/tcg-self-service/data/vmcontrol;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# =============================================================================
# Entra ID (Azure AD) OAuth2 Authentication
# =============================================================================
# Set entraid.enabled=true and uncomment the OAuth2 properties below to enable
# authentication via Microsoft Entra ID. When disabled, all requests are permitted.
entraid.enabled=false

# Uncomment and configure the following when entraid.enabled=true:
spring.security.oauth2.client.registration.azure.provider=azure
spring.security.oauth2.client.registration.azure.client-id=***REMOVED***
spring.security.oauth2.client.registration.azure.client-secret=***REMOVED***
spring.security.oauth2.client.registration.azure.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.azure.scope=openid,profile,email
spring.security.oauth2.client.registration.azure.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.provider.azure.authorization-uri=https://login.microsoftonline.com/***REMOVED***/oauth2/v2.0/authorize
spring.security.oauth2.client.provider.azure.token-uri=https://login.microsoftonline.com/***REMOVED***/oauth2/v2.0/token
spring.security.oauth2.client.provider.azure.jwk-set-uri=https://login.microsoftonline.com/***REMOVED***/discovery/v2.0/keys

# =============================================================================
# AWS Configuration
# =============================================================================
aws.access-key=***REMOVED***
aws.secret-key=***REMOVED***
aws.region=ap-south-1

# =============================================================================
# VM State Sync Configuration
# =============================================================================
# Enable/disable automatic VM state synchronization
vm.state.sync.enabled=true
# Sync interval in milliseconds (default: 5 minutes = 300000)
vm.state.sync.interval=300000
# Initial delay before first sync in milliseconds (default: 1 minute = 60000)
vm.state.sync.initial-delay=60000

