<!--
  Common/Shared Templates
  Reusable templates for loading states, errors, confirmations, etc.
-->

<!-- Loading State -->
<template id="loading-state-template">
    <div class="loading-state">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
        <p class="mt-3">{{message}}</p>
    </div>
</template>


<!-- Error State -->
<template id="error-state-template">
    <div class="error-state">
        <i class="fas fa-exclamation-triangle fa-3x text-warning"></i>
        <h4 class="mt-3">{{title}}</h4>
        <p>{{message}}</p>
        <button class="btn btn-primary" id="btn-retry">
            <i class="fas fa-sync me-1"></i> Try Again
        </button>
    </div>
</template>


<!-- Empty State -->
<template id="empty-state-template">
    <div class="empty-state">
        <i class="fas {{icon}} fa-3x text-muted"></i>
        <h4 class="mt-3">{{title}}</h4>
        <p class="text-muted">{{message}}</p>
        {{#if actionText}}
        <a href="#" class="btn btn-primary" data-content="{{actionContent}}">
            <i class="fas {{actionIcon}} me-1"></i> {{actionText}}
        </a>
        {{/if}}
    </div>
</template>


<!-- Confirmation Modal -->
<template id="confirm-modal-template">
    <div class="modal fade" id="confirmModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="confirm-title">Confirm</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p id="confirm-message">Are you sure?</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn" id="btn-confirm">
                        Confirm
                    </button>
                </div>
            </div>
        </div>
    </div>
</template>


<!-- Toast Notification -->
<template id="toast-template">
    <div class="toast align-items-center text-bg-{{type}} border-0" role="alert">
        <div class="d-flex">
            <div class="toast-body">
                <i class="fas {{icon}} me-2"></i>
                {{message}}
            </div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto"
                    data-bs-dismiss="toast"></button>
        </div>
    </div>
</template>


<!-- Pagination -->
<template id="pagination-template">
    <nav aria-label="Page navigation">
        <ul class="pagination pagination-sm mb-0">
            <li class="page-item {{#unless hasPrev}}disabled{{/unless}}">
                <a class="page-link" href="#" data-page="prev">
                    <i class="fas fa-chevron-left"></i>
                </a>
            </li>
            {{#each pages}}
            <li class="page-item {{#if active}}active{{/if}}">
                <a class="page-link" href="#" data-page="{{number}}">{{number}}</a>
            </li>
            {{/each}}
            <li class="page-item {{#unless hasNext}}disabled{{/unless}}">
                <a class="page-link" href="#" data-page="next">
                    <i class="fas fa-chevron-right"></i>
                </a>
            </li>
        </ul>
    </nav>
</template>


<!-- Status Badge -->
<template id="status-badge-template">
    <span class="badge bg-{{color}}">
        {{#if icon}}<i class="fas {{icon}} me-1"></i>{{/if}}
        {{text}}
    </span>
</template>


<!-- User Avatar -->
<template id="user-avatar-template">
    <div class="user-avatar" style="background: {{bgColor}}">
        {{#if imageUrl}}
        <img src="{{imageUrl}}" alt="{{name}}">
        {{else}}
        {{initials}}
        {{/if}}
    </div>
</template>


<!-- Search Input with Clear Button -->
<template id="search-input-template">
    <div class="input-group">
        <span class="input-group-text"><i class="fas fa-search"></i></span>
        <input type="text" class="form-control" id="{{id}}"
               placeholder="{{placeholder}}" aria-label="{{placeholder}}">
        <button class="btn btn-outline-secondary d-none" type="button" id="{{id}}-clear">
            <i class="fas fa-times"></i>
        </button>
    </div>
</template>


<!-- Table Row Loading Skeleton -->
<template id="table-skeleton-template">
    <tr class="placeholder-glow">
        <td><span class="placeholder col-8"></span></td>
        <td><span class="placeholder col-4"></span></td>
        <td><span class="placeholder col-6"></span></td>
        <td><span class="placeholder col-4"></span></td>
    </tr>
</template>


<!-- Card Loading Skeleton -->
<template id="card-skeleton-template">
    <div class="card placeholder-glow">
        <div class="card-body">
            <h5 class="card-title placeholder col-6"></h5>
            <p class="card-text">
                <span class="placeholder col-7"></span>
                <span class="placeholder col-4"></span>
                <span class="placeholder col-8"></span>
            </p>
        </div>
    </div>
</template>


<!-- Help Tooltip -->
<template id="help-tooltip-template">
    <span class="help-tooltip" data-bs-toggle="tooltip" title="{{text}}">
        <i class="fas fa-question-circle text-muted"></i>
    </span>
</template>


<!-- Keyboard Shortcut Display -->
<template id="kbd-template">
    <kbd class="px-2 py-1">
        {{#each keys}}
        <span class="key">{{this}}</span>
        {{/each}}
    </kbd>
</template>
