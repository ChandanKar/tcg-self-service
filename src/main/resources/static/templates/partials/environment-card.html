<!--
  Partial: Environment Card Component
  Reusable environment summary card for lists

  Usage: TemplateLoader.loadPartial('environment-card.html', envData)
-->

<div class="environment-list-card" data-env-id="{{environmentId}}">
    <div class="env-header">
        <h5 class="env-name">{{displayName}}</h5>
        <div class="env-status-badges">
            <span class="status-dot {{statusClass}}" title="{{statusText}}"></span>
            {{#if isLocked}}
            <span class="badge bg-warning text-dark">
                <i class="fas fa-lock"></i> Locked
            </span>
            {{/if}}
        </div>
    </div>

    {{#if description}}
    <p class="env-description">{{description}}</p>
    {{/if}}

    <div class="env-stats">
        <span class="stat">
            <i class="fas fa-server"></i>
            <strong>{{totalVms}}</strong> VMs
        </span>
        <span class="stat text-success">
            <i class="fas fa-play-circle"></i>
            <strong>{{runningVms}}</strong> Running
        </span>
        <span class="stat">
            <i class="fas fa-layer-group"></i>
            <strong>{{groupCount}}</strong> Groups
        </span>
        {{#if accessLevel}}
        <span class="stat">
            <i class="fas fa-user-tag"></i>
            {{accessLevel}}
        </span>
        {{/if}}
    </div>

    <div class="env-actions mt-2">
        <button class="btn btn-sm btn-outline-primary" data-action="view">
            <i class="fas fa-eye me-1"></i> View
        </button>
        <button class="btn btn-sm btn-success" data-action="start-all"
                {{#if allRunning}}disabled{{/if}}>
            <i class="fas fa-play"></i>
        </button>
        <button class="btn btn-sm btn-danger" data-action="stop-all"
                {{#if allStopped}}disabled{{/if}}>
            <i class="fas fa-stop"></i>
        </button>
    </div>
</div>
