<!--
  Partial: Metric Card Component
  Reusable metric display card

  Usage: TemplateLoader.loadPartial('metric-card.html', {value, label, icon, color})
-->

<div class="metric-card card-base">
    <div class="metric-icon {{color}}-bg">
        <i class="{{icon}}"></i>
    </div>
    <div class="metric-content">
        <div class="metric-value {{color}}" id="{{valueId}}">{{value}}</div>
        <div class="metric-label-hint">{{label}}</div>
    </div>
</div>
