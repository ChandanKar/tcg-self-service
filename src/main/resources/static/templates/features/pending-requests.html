<!--
  Pending Requests Feature Template (Admin View)
  Used by access-requests.js to render the pending requests page
-->

<div class="content-view" id="pending-requests-view">
    <!-- Header -->
    <div class="content-header">
        <div class="d-flex justify-content-between align-items-start">
            <div>
                <h1>Pending Access Requests</h1>
                <p>Review and approve user access requests</p>
            </div>
            <button class="btn btn-outline-secondary btn-sm" id="btn-refresh-requests">
                <i class="fas fa-sync"></i> Refresh
            </button>
        </div>
    </div>

    <!-- Filter Bar -->
    <div class="card mb-3">
        <div class="card-body py-2">
            <div class="row align-items-center">
                <div class="col-md-4">
                    <div class="input-group input-group-sm">
                        <span class="input-group-text"><i class="fas fa-search"></i></span>
                        <input type="text" class="form-control" id="request-search"
                               placeholder="Search by user or environment...">
                    </div>
                </div>
                <div class="col-md-3">
                    <select class="form-select form-select-sm" id="filter-environment">
                        <option value="">All Environments</option>
                        <!-- Populated by JavaScript -->
                    </select>
                </div>
                <div class="col-md-3">
                    <select class="form-select form-select-sm" id="filter-access-level">
                        <option value="">All Access Levels</option>
                        <option value="USER">User</option>
                        <option value="ENV_ADMIN">Environment Admin</option>
                    </select>
                </div>
                <div class="col-md-2 text-end">
                    <span class="badge bg-primary" id="request-count">0 pending</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Pending Requests List -->
    <div id="pending-requests-container">
        <!-- Populated by JavaScript -->
    </div>
</div>


<!-- Empty State Template -->
<template id="no-requests-template">
    <div class="empty-state">
        <i class="fas fa-inbox fa-3x text-muted"></i>
        <p class="mt-3">No pending requests</p>
        <p class="text-muted">All access requests have been processed</p>
    </div>
</template>


<!-- Request Card Template -->
<template id="request-card-template">
    <div class="card mb-3 request-card" data-request-id="{{requestId}}">
        <div class="card-body">
            <div class="row">
                <!-- Requester Info -->
                <div class="col-md-4">
                    <div class="d-flex align-items-center mb-2">
                        <div class="user-avatar me-3">
                            <i class="fas fa-user"></i>
                        </div>
                        <div>
                            <strong class="d-block">{{userName}}</strong>
                            <small class="text-muted">{{userEmail}}</small>
                        </div>
                    </div>
                    <small class="text-muted">
                        <i class="fas fa-clock me-1"></i>Requested {{requestedAt}}
                    </small>
                </div>

                <!-- Request Details -->
                <div class="col-md-5">
                    <div class="mb-2">
                        <span class="badge bg-secondary me-2">Environment</span>
                        <strong>{{environmentName}}</strong>
                    </div>
                    <div class="mb-2">
                        <span class="badge bg-info me-2">Access Level</span>
                        {{accessLevel}}
                    </div>
                    <div class="reason-text text-muted" style="font-size: 0.875rem;">
                        {{reason}}
                    </div>
                </div>

                <!-- Actions -->
                <div class="col-md-3 text-end">
                    <div class="btn-group">
                        <button class="btn btn-success btn-sm" data-action="approve"
                                data-request-id="{{requestId}}">
                            <i class="fas fa-check me-1"></i> Approve
                        </button>
                        <button class="btn btn-danger btn-sm" data-action="reject"
                                data-request-id="{{requestId}}">
                            <i class="fas fa-times me-1"></i> Reject
                        </button>
                    </div>
                </div>
            </div>

            <!-- Dual Authorization Section (if applicable) -->
            <div class="dual-auth-section mt-3" id="dual-auth-{{requestId}}" style="display: none;">
                <h6><i class="fas fa-shield-alt me-1"></i> Dual Authorization Required</h6>
                <div class="auth-status">
                    <div class="auth-item" id="auth1-{{requestId}}">
                        <i class="fas fa-circle"></i>
                        <span>First Approval: <span class="approver">Pending</span></span>
                    </div>
                    <div class="auth-item" id="auth2-{{requestId}}">
                        <i class="fas fa-circle"></i>
                        <span>Second Approval: <span class="approver">Pending</span></span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</template>


<!-- Reject Reason Modal -->
<template id="reject-modal-template">
    <div class="modal fade" id="rejectModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Reject Request</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p>Rejecting request from <strong id="reject-user-name"></strong>
                       for <strong id="reject-env-name"></strong></p>

                    <div class="mb-3">
                        <label for="rejectReason" class="form-label">Reason for Rejection</label>
                        <textarea class="form-control" id="rejectReason" rows="3" required
                                  placeholder="Please provide a reason for rejection..."></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-danger" id="btn-confirm-reject">
                        <i class="fas fa-times me-1"></i> Reject Request
                    </button>
                </div>
            </div>
        </div>
    </div>
</template>
