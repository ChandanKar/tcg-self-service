<!--
  User Management Feature Template (Admin View)
  Used by features.js to render the user management page
-->

<div class="content-view" id="user-management-view">
    <!-- Header -->
    <div class="content-header">
        <div class="d-flex justify-content-between align-items-start">
            <div>
                <h1>User Management</h1>
                <p>Manage platform users and their roles</p>
            </div>
            <div class="header-actions">
                <button class="btn btn-primary btn-sm" id="btn-add-user">
                    <i class="fas fa-user-plus me-1"></i> Add User
                </button>
                <button class="btn btn-outline-secondary btn-sm" id="btn-refresh-users">
                    <i class="fas fa-sync"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Search and Filters -->
    <div class="user-filters-bar">
        <div class="search-input">
            <div class="input-group">
                <span class="input-group-text"><i class="fas fa-search"></i></span>
                <input type="text" class="form-control" id="user-search"
                       placeholder="Search users by name or email...">
            </div>
        </div>
        <select class="form-select filter-select" id="filter-role">
            <option value="">All Roles</option>
            <option value="ADMIN">Admin</option>
            <option value="ENV_ADMIN">Environment Admin</option>
            <option value="USER">User</option>
        </select>
        <select class="form-select filter-select" id="filter-status">
            <option value="">All Status</option>
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
        </select>
    </div>

    <!-- User Stats -->
    <div class="user-stats mb-3">
        <div class="user-stat-card">
            <div class="stat-value" id="stat-total-users">--</div>
            <div class="stat-label">Total Users</div>
        </div>
        <div class="user-stat-card">
            <div class="stat-value text-success" id="stat-active-users">--</div>
            <div class="stat-label">Active</div>
        </div>
        <div class="user-stat-card">
            <div class="stat-value" id="stat-admins">--</div>
            <div class="stat-label">Admins</div>
        </div>
    </div>

    <!-- User List -->
    <div class="user-list-container" id="user-list">
        <!-- Populated by JavaScript -->
    </div>

    <!-- Pagination -->
    <div class="log-pagination" id="user-pagination">
        <!-- Pagination controls -->
    </div>
</div>


<!-- User Card Template -->
<template id="user-card-template">
    <div class="user-card" data-user-id="{{userId}}">
        <div class="user-avatar">
            {{initials}}
        </div>
        <div class="user-info">
            <div class="user-name">{{displayName}}</div>
            <div class="user-email">{{email}}</div>
        </div>
        <span class="user-role {{roleClass}}">{{role}}</span>
        <div class="user-actions">
            <button class="btn btn-sm btn-outline-primary" data-action="edit" title="Edit User">
                <i class="fas fa-edit"></i>
            </button>
            <button class="btn btn-sm btn-outline-secondary" data-action="access" title="Manage Access">
                <i class="fas fa-key"></i>
            </button>
            <button class="btn btn-sm btn-outline-danger" data-action="delete" title="Delete User">
                <i class="fas fa-trash"></i>
            </button>
        </div>
    </div>
</template>


<!-- Empty State -->
<template id="no-users-template">
    <div class="empty-state">
        <i class="fas fa-users"></i>
        <h4>No Users Found</h4>
        <p>No users match your current filters.</p>
    </div>
</template>


<!-- Add/Edit User Modal -->
<template id="user-modal-template">
    <div class="modal fade" id="userModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="userModalTitle">Add User</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="userForm" class="user-form">
                        <!-- Basic Info Section -->
                        <div class="form-section">
                            <div class="form-section-title">Basic Information</div>
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label for="userName" class="form-label">Username <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="userName" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="userEmail" class="form-label">Email <span class="text-danger">*</span></label>
                                    <input type="email" class="form-control" id="userEmail" required>
                                </div>
                            </div>
                            <div class="row g-3 mt-1">
                                <div class="col-md-6">
                                    <label for="userDisplayName" class="form-label">Display Name</label>
                                    <input type="text" class="form-control" id="userDisplayName">
                                </div>
                                <div class="col-md-6">
                                    <label for="userRole" class="form-label">Role <span class="text-danger">*</span></label>
                                    <select class="form-select" id="userRole" required>
                                        <option value="USER">User</option>
                                        <option value="ENV_ADMIN">Environment Admin</option>
                                        <option value="ADMIN">Admin</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <!-- Environment Access Section -->
                        <div class="form-section">
                            <div class="form-section-title">Environment Access</div>
                            <p class="text-muted small">Select environments this user should have access to.</p>
                            <div class="env-access-list" id="envAccessList">
                                <!-- Populated by JavaScript -->
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="btn-save-user">
                        <i class="fas fa-save me-1"></i> Save User
                    </button>
                </div>
            </div>
        </div>
    </div>
</template>


<!-- Delete Confirmation Modal -->
<template id="delete-user-modal-template">
    <div class="modal fade" id="deleteUserModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Delete User</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p>Are you sure you want to delete user <strong id="delete-user-name"></strong>?</p>
                    <p class="text-danger small">
                        <i class="fas fa-exclamation-triangle me-1"></i>
                        This action cannot be undone. All access rights will be revoked.
                    </p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-danger" id="btn-confirm-delete">
                        <i class="fas fa-trash me-1"></i> Delete User
                    </button>
                </div>
            </div>
        </div>
    </div>
</template>
