<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - VM Self-Service Platform</title>

    <!-- Bootstrap CSS (CDN) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome (CDN) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Application CSS -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <!-- Logo -->
            <div class="login-logo">
                <img src="logo/tcg_blue_logo.png" alt="TCG Digital - VM Self-Service Platform" class="logo-img">
            </div>

            <!-- Title -->
            <h1 class="login-title">VM Self-Service Platform</h1>
            <p class="login-subtitle">Sign in to manage your virtual machines</p>

            <!-- Error Message Display -->
            <div id="errorAlert" class="alert alert-danger" role="alert" style="display: none;">
                <i class="fas fa-exclamation-circle" aria-hidden="true"></i>
                <span id="errorMessage"></span>
            </div>

            <!-- Login Form -->
            <form class="login-form" id="loginForm">
                <div class="form-group mb-2">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control" id="username" name="username"
                           placeholder="Enter your username" required
                           autocomplete="username">
                </div>

                <div class="form-group mb-2">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password"
                           placeholder="Enter your password" required
                           autocomplete="current-password">
                </div>

                <button type="submit" class="btn btn-primary btn-login" id="submitBtn">
                    <i class="fas fa-sign-in-alt" aria-hidden="true"></i> Sign In
                </button>
            </form>

            <!-- Divider -->
            <div class="login-divider">
                <span>OR</span>
            </div>

            <!-- Entra ID Login Button -->
            <div class="entraid-login">
                <a href="/oauth2/authorization/azure" class="btn btn-entraid">
                    <i class="fab fa-microsoft"></i> Sign in with Entra ID
                </a>
            </div>

            <!-- Logout Success Message -->
            <div id="logoutMessage" class="alert alert-success" style="display: none;">
                <i class="fas fa-check-circle"></i> You have been successfully logged out.
            </div>

            <!-- Footer -->
            <div class="login-footer">
                <p class="text-muted">
                    <small>Powered by TCG Digital &copy; 2026</small>
                </p>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Show logout message if present in URL -->
    <script>
        /**
         * Handle login form submission via AJAX.
         * Sends username/password to /api/auth/login endpoint.
         */
        document.addEventListener('DOMContentLoaded', function() {
            // Handle logout message display
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('logout')) {
                const logoutMsg = document.getElementById('logoutMessage');
                if (logoutMsg) {
                    logoutMsg.style.display = 'block';
                    setTimeout(() => {
                        logoutMsg.style.display = 'none';
                    }, 5000);
                }
            }

            // Handle login form submission
            const loginForm = document.getElementById('loginForm');
            const submitBtn = document.getElementById('submitBtn');
            const errorAlert = document.getElementById('errorAlert');
            const errorMessage = document.getElementById('errorMessage');

            if (loginForm) {
                loginForm.addEventListener('submit', async function(e) {
                    e.preventDefault();

                    // Get form values
                    const username = document.getElementById('username').value.trim();
                    const password = document.getElementById('password').value;

                    // Basic validation
                    if (!username || !password) {
                        showError('Username and password are required');
                        return;
                    }

                    // Show loading state
                    setButtonLoading(true);
                    hideError();

                    try {
                        // Send login request to backend
                        const response = await fetch('/api/auth/login', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            credentials: 'include',  // Include cookies for session
                            body: JSON.stringify({
                                username: username,
                                password: password
                            })
                        });

                        if (response.ok) {
                            // Successful login - redirect to home
                            const data = await response.json();
                            console.log('Login successful', data);
                            window.location.href = '/home';
                        } else {
                            // Failed login
                            const data = await response.json();
                            showError(data.message || 'Invalid credentials or user not found.');
                        }
                    } catch (error) {
                        console.error('Login error:', error);
                        showError('Login failed. Please try again.');
                    } finally {
                        // Reset loading state
                        setButtonLoading(false);
                    }
                });
            }

            /**
             * Display error message in alert box
             */
            function showError(message) {
                if (errorAlert && errorMessage) {
                    errorMessage.textContent = message;
                    errorAlert.style.display = 'block';
                    // Auto-hide after 5 seconds
                    setTimeout(() => {
                        hideError();
                    }, 5000);
                }
            }

            /**
             * Hide error message
             */
            function hideError() {
                if (errorAlert) {
                    errorAlert.style.display = 'none';
                }
            }

            /**
             * Update button loading state
             */
            function setButtonLoading(isLoading) {
                if (submitBtn) {
                    if (isLoading) {
                        submitBtn.disabled = true;
                        submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';
                    } else {
                        submitBtn.disabled = false;
                        submitBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
                    }
                }
            }
        });
    </script>
</body>
</html>
