spring.application.name=vmcontrol-test

# Testcontainers JDBC URL — starts a real MySQL 8.0 container automatically.
# Requires Docker running. No changes needed in test classes.
spring.datasource.url=jdbc:tc:mysql:8.0:///db_test
spring.datasource.driver-class-name=org.testcontainers.jdbc.ContainerDatabaseDriver
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# Flyway migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.clean-disabled=false
spring.flyway.baseline-on-migrate=true

# Disable security for tests
entraid.enabled=false

# AWS mock values for tests
aws.access-key=test-access-key
aws.secret-key=test-secret-key
aws.region=us-east-1

logging.level.root=WARN
logging.level.com.tcgdigital.vmcontrol=INFO