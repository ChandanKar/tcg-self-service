# Override application properties for tests - use in-memory H2 database
spring.application.name=vmcontrol-test

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# Flyway migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.clean-disabled=false

# H2 console disabled for tests
spring.h2.console.enabled=false

# Disable security for tests
entraid.enabled=false

# AWS Configuration (mock values for tests)
aws.access-key=test-access-key
aws.secret-key=test-secret-key
aws.region=us-east-1

# Logging - reduce verbosity
logging.level.root=WARN
logging.level.com.tcgdigital.vmcontrol=INFO

